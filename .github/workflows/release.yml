name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@victor-software-house'
          always-auth: true

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(jq -r '.version' package.json)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Releasing $PKG_VERSION"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks --access restricted

      - name: Extract changelog body for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY="$(awk -v v="$VERSION" '
            $0 ~ "^## " v "( |$)" { in_section=1; next }
            in_section && $0 ~ "^## " { in_section=0 }
            in_section { print }
          ' CHANGELOG.md)"
          if [ -z "${BODY// }" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          {
            echo "body<<__CHANGELOG_EOF__"
            echo "$BODY"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
