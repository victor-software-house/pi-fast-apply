output:
  - failure
  - summary

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: false
  commands:
    oxlint-fix:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      stage_fixed: true
      run: bunx oxlint --fix --import-plugin {staged_files}
    format:
      stage_fixed: true
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck

pre-push:
  parallel: false
  commands:
    lockfile-sync:
      priority: 0
      run: |
        bun install
        if ! git diff --quiet -- bun.lock; then
          echo ""
          echo "Lockfile is out of sync. Commit the updated lockfile before pushing:"
          echo ""
          git diff --stat -- bun.lock
          echo ""
          echo "  git add bun.lock && git commit -m 'chore: sync lockfile'"
          echo ""
          exit 1
        fi
    typecheck:
      priority: 1
      run: bun run typecheck
    lint:
      priority: 2
      run: bun run lint
