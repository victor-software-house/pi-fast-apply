output:
  - failure
  - summary

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: false
  commands:
    oxlint-fix:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      stage_fixed: true
      run: pnpm exec oxlint --fix --import-plugin {staged_files}
    format:
      stage_fixed: true
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck

pre-push:
  parallel: false
  commands:
    lockfile-sync:
      priority: 0
      run: |
        pnpm install
        if ! git diff --quiet -- pnpm-lock.yaml; then
          echo ""
          echo "Lockfile is out of sync. Commit the updated lockfile before pushing:"
          echo ""
          git diff --stat -- pnpm-lock.yaml
          echo ""
          echo "  git add pnpm-lock.yaml && git commit -m 'chore: sync lockfile'"
          echo ""
          exit 1
        fi
    typecheck:
      priority: 1
      run: pnpm run typecheck
    lint:
      priority: 2
      run: pnpm run lint
